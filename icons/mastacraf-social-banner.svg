  <!-- Icon: 180x180 at (80,195). Scale = 180/512 = 0.3516.
       512-path points × 0.3516 + offset:
       (64,384)  → (22.5,135)  + (80,195) = (102.5, 330)
       (160,192) → (56.3,67.5) + (80,195) = (136.3, 262.5)
       (256,320) → (90,112.5)  + (80,195) = (170,   307.5)
       (352,128) → (123.8,45)  + (80,195) = (203.8, 240)
       (448,384) → (157.5,135) + (80,195) = (237.5, 330)
  -->
  <rect x="80" y="195" width="180" height="180" rx="32" fill="#e8913a"/>
  <path d="M102.5 330 L136.3 262.5 L170 307.5 L203.8 240 L237.5 330"
    fill="none"
    stroke="#09090c"
    stroke-width="15.5"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <text x="300" y="323" font-family="'Syne','Arial Black',system-ui,sans-serif" font-weight="800" font-size="120" letter-spacing="-3" fill="#eeeef8">mastacraf</text>
